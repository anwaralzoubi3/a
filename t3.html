<!DOCTYPE html>
<head>
<title>Styling source code: Code snippet</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

h2{
    font-weight: normal;
}

.code-box{
    background-color:#eeeeee;
    padding:20px;
    width:600px;
    font-family: Consolas;
}

.selector{
    color:black;
}

.property{
    color:#1e5eff;
}

.value{
    color:green;
}
</style>

</head>

<body>

<h2>Styling source code: Code snippet</h2>
<hr>

<div class="code-box">

<span class="selector">h1</span> { <br>
&nbsp;&nbsp;<span class="property">font-family:</span> <span class="value">Verdana</span>; <br>
&nbsp;&nbsp;<span class="property">font-size:</span> <span class="value">1.2em</span>; <br>
} <br><br>

<span class="selector">p</span> { <br>
&nbsp;&nbsp;<span class="property">font-family:</span> <span class="value">Arial</span>; <br>
&nbsp;&nbsp;<span class="property">color:</span> <span class="value">blue</span>; <br>
&nbsp;&nbsp;<span class="property">text-align:</span> <span class="value">right</span>; <br>
}

</div>

</body>
</html>
