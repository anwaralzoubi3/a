<!DOCTYPE html>
<html>
<head>
<title>Styling text</title>

<style>

body{
    background-color:#eeeeee;
    font-family: Arial;
    margin:40px;
}

h1{
    color:orange;
    font-size:60px;
}

h2{
    text-align:right;
    font-size:60px;
}

.p1{
    font-size:40px;
}

.p2{
    text-align:right;
    font-size:40px;
    font-family: "Courier New";
}

</style>

</head>

<body>

<h1>Styling text</h1>

<h2>Heading Num. 2</h2>

<p class="p1">My first paragraph.</p>

<p class="p2">My second paragraph.</p>

</body>
</html>
