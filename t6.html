<!DOCTYPE html>
<head>
<title>Image Gallery</title>

<style>

body{
    margin:0;
    padding:40px 0 40px 40px; 
    background:#f4f4f4;
    font-family:Arial, sans-serif;
}
.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}
.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:12px;
    transition:transform 0.3s ease, box-shadow 0.3s ease;
}
.gallery img:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

</style>
</head>

<body>

<div class="gallery">
<img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcSirW9GkNm4l9AZMo3o-d5QY5Y-ah8ei7EthTTLBjBtaZRygkLr">
