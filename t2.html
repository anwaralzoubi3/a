<!DOCTYPE html>
<html>
<head>
<title>Table Styling</title>

<style>

body{
    font-family: Georgia;
    margin:40px;
}

h1{
    font-size:36px;
}


table{
    border-spacing:25px; 
}


td{
    padding:15px 30px;
    font-size:22px;
    background:#f3f3f3;
    border:2px solid #999;
    border-radius:12px;

    
    box-shadow:3px 4px 6px rgba(0,0,0,0.4);

    text-align:center;
}

</style>

</head>

<body>

<h1>Table Styling</h1>

<table>

<tr>
<td>Row 1, Col 1</td>
<td>Row 1, Col 2</td>
<td>Row 1, Col 3</td>
</tr>

<tr>
<td>Row 2, Col 1</td>
<td>Row 2, Col 2</td>
<td>Row 2, Col 3</td>
</tr>

</table>

</body>
</html>
